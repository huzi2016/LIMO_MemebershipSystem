name: Plugin Code Check

on: [push, pull_request]

jobs:
  phpcs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      # 增加 -vvv 详细模式，强制输出所有检查详情
      # 使用 --report=full 确保错误列表完整显示
      - name: Run PHPCS
        run: ./vendor/bin/phpcs --standard=phpcs.xml -vvv --report=full .