name: Plugin Code Check

on: [push, pull_request]

jobs:
  phpcs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      # 1. 先尝试自动修复大部分格式问题
      - name: Run PHPCBF (Auto Fix)
        run: ./vendor/bin/phpcbf --standard=phpcs.xml LIMO_MemebershipSystem/ || true

      # 2. 再进行最终的规范检查
      - name: Run PHPCS
        run: ./vendor/bin/phpcs --standard=phpcs.xml LIMO_MemebershipSystem/