name: Plugin Code Check
on: [push, pull_request]
jobs:
  phpcs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      # 1. 运行自动修复（PHPCBF），并提交修改
      - name: Run PHPCBF (Auto Fix)
        run: |
          ./vendor/bin/phpcbf --standard=phpcs.xml --extensions=php ./**/*.php || true
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add .
          git commit -m "自动修复：符合WordPress代码规范" || echo "没有需要修复的代码"
          git push

      # 2. 运行检查（PHPCS）
      - name: Run PHPCS
        run: ./vendor/bin/phpcs --standard=phpcs.xml --extensions=php --report=full ./**/*.php