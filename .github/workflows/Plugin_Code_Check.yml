name: Plugin Code Check

on: [push, pull_request]

jobs:
  phpcs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress
      
      - name: Run PHPCS 
        # 强制扫描所有子目录下的 .php 文件，不再受限于特定文件夹名的大小写
        run: ./vendor/bin/phpcs --standard=phpcs.xml --extensions=php --report=full ./**/*.php