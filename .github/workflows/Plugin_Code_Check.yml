name: Plugin Code Check

on: [push, pull_request]

jobs:
  phpcs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      # 检查执行：使用 --report=full 输出完整错误报告，使用 --extensions=php 确保只扫描 PHP 文件
      - name: Run PHPCS
        run: ./vendor/bin/phpcs --standard=phpcs.xml --extensions=php --report=full .